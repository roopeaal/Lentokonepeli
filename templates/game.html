<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lentokenttäarvausmestari - Pelaa</title>
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to top, floralwhite, lightsteelblue) ;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #333;
            margin: 0;
            letter-spacing: 0.8px;
        }

        .otsikko-rivi {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin: 10px 0 4px;
        }

        .kompassi-kortti {
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 10px 10px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .kompassi {
            position: relative;
            width: 150px;
            height: 150px;
            border: 2px solid #2f3a45;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 42%, #f1f4f7 100%);
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7);
        }

        .kompassi::before,
        .kompassi::after {
            content: "";
            position: absolute;
            background: rgba(47, 58, 69, 0.7);
        }

        .kompassi::before {
            left: 50%;
            top: 10px;
            width: 2px;
            height: 130px;
            transform: translateX(-50%);
        }

        .kompassi::after {
            top: 50%;
            left: 10px;
            width: 130px;
            height: 2px;
            transform: translateY(-50%);
        }

        .kompassi-viisto {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 2px;
            height: 132px;
            background: rgba(47, 58, 69, 0.45);
            transform-origin: center;
        }

        .kompassi-viisto.v1 {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .kompassi-viisto.v2 {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .kompassi-nuoli {
            position: absolute;
            left: 50%;
            top: 18px;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-bottom: 24px solid #d62828;
            filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.28));
        }

        .kompassi-merkki {
            position: absolute;
            color: #1c2732;
            font-size: 14px;
            font-weight: 700;
            transform: translate(-50%, -50%);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .kompassi-merkki.n { left: 50%; top: 8%; }
        .kompassi-merkki.ne { left: 78%; top: 22%; }
        .kompassi-merkki.e { left: 92%; top: 50%; }
        .kompassi-merkki.se { left: 78%; top: 78%; }
        .kompassi-merkki.s { left: 50%; top: 92%; }
        .kompassi-merkki.sw { left: 22%; top: 78%; }
        .kompassi-merkki.w { left: 8%; top: 50%; }
        .kompassi-merkki.nw { left: 22%; top: 22%; }

        .kompassi-selite {
            max-width: 210px;
            text-align: center;
            font-size: 11px;
            line-height: 1.25;
            color: #26323e;
        }

        @media (max-width: 700px) {
            .kompassi {
                width: 124px;
                height: 124px;
            }

            .kompassi::before {
                top: 9px;
                height: 106px;
            }

            .kompassi::after {
                left: 9px;
                width: 106px;
            }

            .kompassi-viisto {
                height: 108px;
            }

            .kompassi-nuoli {
                top: 14px;
                border-left-width: 7px;
                border-right-width: 7px;
                border-bottom-width: 19px;
            }

            .kompassi-selite {
                max-width: 180px;
                font-size: 10px;
            }
        }

        form {
            text-align: center;
            margin-top: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            color: #495057;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 90%; /* Adjust the width as needed */
            max-width: 500px; /* Set a maximum width if desired */
            padding: 10px;
            margin: 0 auto; /* Center the input field horizontally */
            display: block; /* Make the input field a block element */
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            background-color: #555;
        }

        .error {
            color: red;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            width: 60%; /* Adjust the width as needed */
            max-width: 300px; /* Set a maximum width if desired */
        }

        a:hover {
            background-color: #555;
        }

        #kartta {
            height: 400px;
            width: 80%; /* Adjust the width as needed */
            max-width: 900px; /* Set a maximum width if desired */
            margin: 20px 0; /* Adjust the margin as needed */
        }

        #lentokentta-nimi {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        #pisteet {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="otsikko-rivi">
        <h1>MAAILMAN MAAGINEN MAANARVAUSPELI</h1>
        <div class="kompassi-kortti" aria-label="Kompassi jossa ilmansuunnat ja väli-ilmansuunnat">
            <div class="kompassi">
                <span class="kompassi-viisto v1"></span>
                <span class="kompassi-viisto v2"></span>
                <span class="kompassi-nuoli"></span>
                <span class="kompassi-merkki n">P</span>
                <span class="kompassi-merkki ne">KP</span>
                <span class="kompassi-merkki e">I</span>
                <span class="kompassi-merkki se">KI</span>
                <span class="kompassi-merkki s">E</span>
                <span class="kompassi-merkki sw">KL</span>
                <span class="kompassi-merkki w">L</span>
                <span class="kompassi-merkki nw">PL</span>
            </div>
            <p class="kompassi-selite">P=Pohjoinen, I=Ita, E=Etela, L=Lansi, KP=Koillinen, KI=Kaakko, KL=Lounas, PL=Luode</p>
        </div>
    </div>

    <form action="/game" method="post">
        <label for="pelaajan_maa">Arvaa maa:</label>
        <input type="text" id="pelaajan_maa" name="pelaajan_maa" required>
        <input type="submit" value="Arvaa">
    </form>

    <!-- Näytä tulos tai virheviesti -->
    {% if result %}
        <p class="{{ 'error' if result_category == 'danger' else '' }}">{{ result }}</p>
    {% endif %}

    <!-- Lisää kartta-div-elementti -->
    <div id="kartta"></div>

    <!-- Lisää "Vihje" -napin ja suurimman lentokentän nimen näyttävän elementin -->
    <button id="vihje-nappi" type="button" {% if vihje_kaytetty %}disabled{% endif %}>Vihje -300p</button>
    <p id="lentokentta-nimi" {% if vihje_teksti %}style="display: block;"{% endif %}>{{ vihje_teksti or '' }}</p>

    <!-- Näytä pisteet -->
    <p id="pisteet">Pisteet: {{ points }}</p>

    <!-- Lisää "Aloita uusi peli" -linkki -->
    <a href="#" id="uusi-peli-linkki">Aloita uusi peli</a>

    <!-- Lisää linkit navigointiin -->
    <a href="/leaderboard">Pistetaulukko</a>
    <a href="/logout">Kirjaudu ulos</a>

    <!-- Leaflet.js ja JavaScript-koodi -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Luo kartta
            var kartta = L.map('kartta').setView([0, 0], 2); // Aseta alkuarvo ja zoom-taso
            var arvatutMaat = {{ arvatut_maat|default([], true)|tojson }};

            // Lisää taustakartta ilman tekstejä (no labels)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
            }).addTo(kartta);

            function piirraMaidenRajatJaArvatutMaat() {
                fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
                    .then(response => response.json())
                    .then(data => {
                        L.geoJSON(data, {
                            style: function (feature) {
                                var isoKoodi = ((feature.properties || {})['ISO3166-1-Alpha-2'] || '').toUpperCase();
                                var onArvattu = arvatutMaat.includes(isoKoodi);
                                return {
                                    color: onArvattu ? '#b00020' : '#4a4a4a',
                                    weight: onArvattu ? 2.0 : 1.4,
                                    opacity: 0.95,
                                    fillColor: onArvattu ? '#ff3b30' : '#ffffff',
                                    fillOpacity: onArvattu ? 0.45 : 0.02
                                };
                            }
                        }).addTo(kartta);
                    })
                    .catch(error => {
                        console.error('Virhe maiden rajojen latauksessa: ' + error);
                    });
            }

            // Funktio nuolen piirtämiseen kartalle
            function piirraNuoli(lat1, lon1, lat2, lon2) {
                var nuolenKuva = L.divIcon({
                    className: 'arrow-icon',
                    iconSize: [12, 12],
                    html: '<div class="arrow-up"></div>'
                });

                L.marker([lat1, lon1], { icon: nuolenKuva }).addTo(kartta);

                var polyline = L.polyline([[lat1, lon1], [lat2, lon2]], {
                    color: 'blue'
                }).addTo(kartta);
            }

            // Function to add a large red dot on the map
            function lisaaPunainenPiste(lat, lon) {
                var redDot = L.circleMarker([lat, lon], {
                    radius: 10,
                    color: 'red',
                    fillColor: '#f03',
                    fillOpacity: 0.5
                }).addTo(kartta);
            }

            piirraMaidenRajatJaArvatutMaat();

            // Tarkista, onko etäisyys ja ilmansuunta saatavilla ja piirrä nuoli
            var etaisyys = {{ etaisyys|default('null') }};
            var ilmansuunta = "{{ ilmansuunta|default('') }}";
            if (etaisyys !== null && ilmansuunta !== "") {
                piirraNuoli(0, 0, etaisyys, ilmansuunta);
            }

            // Add red dot if guessed coordinates are available
            {% if pelaajan_maa_koord %}
                lisaaPunainenPiste({{ pelaajan_maa_koord[0] }}, {{ pelaajan_maa_koord[1] }});
            {% endif %}

            // Function to display the largest airport name
            function naytaLentokenttaNimi() {
                fetch('/get_largest_airport_name')  // Lisää uusi reitti palvelimelle
                    .then(response => response.json())
                    .then(data => {
                        var lentokenttaNimi = data.largest_airport_name;
                        var lentokenttaNimiElementti = document.getElementById("lentokentta-nimi");
                        lentokenttaNimiElementti.innerHTML = "Maan suurin lentokenttä on: " + lentokenttaNimi;
                        lentokenttaNimiElementti.style.display = "block";
                        if (data.points !== null && data.points !== undefined) {
                            document.getElementById("pisteet").innerHTML = "Pisteet: " + data.points;
                        }
                        vihjeNappi.disabled = true;
                    })
                    .catch(error => {
                        console.error('Virhe haettaessa suurinta lentokenttää: ' + error);
                    });
            }

            // Listen for the "Hint" button click
            var vihjeNappi = document.getElementById("vihje-nappi");
            vihjeNappi.addEventListener("click", naytaLentokenttaNimi);

            // Etsi "Aloita uusi peli" -linkki
            var uusiPeliLinkki = document.getElementById("uusi-peli-linkki");

            // Lisää klikkaustapahtumankäsittelijä linkille
            uusiPeliLinkki.addEventListener("click", function (event) {
                event.preventDefault(); // Estä linkin oletustoiminto (navigointi)

                // Tee pyyntö uuden maan arpomiseksi
                fetch('/new_game')  // Korvaa '/new_game' tarvittavalla reitillä palvelimellasi
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Uusi maa arvottiin onnistuneesti, päivitä sivu peliä varten
                            location.reload();
                        } else {
                            console.error('Virhe uuden maan arpomisessa.');
                        }
                    })
                    .catch(error => {
                        console.error('Virhe uutta peliä aloittaessa: ' + error);
                    });
            });
        });
    </script>
</body>
</html>
